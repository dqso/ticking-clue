name: Build & Deploy

on:
  push:
    branches: [master]

permissions:
  contents: write

env:
  APP: ticking-clue
  ENTRYPOINT: ./client/desktop

jobs:
  binaries:
    strategy:
      matrix:
        include:
          # Linux needs cgo and X11/GL dev libraries.
          - target: linux-amd64
            runner: ubuntu-latest
            goos: linux
            goarch: amd64
            cgo: '1'
          # Windows is the only target that builds without cgo.
          - target: windows-amd64
            runner: ubuntu-latest
            goos: windows
            goarch: amd64
            cgo: '0'
            ext: .exe
          # macOS backend is cgo (Objective-C), so it needs a macos runner.
          - target: darwin-amd64
            runner: macos-latest
            goos: darwin
            goarch: amd64
            cgo: '1'
          - target: darwin-arm64
            runner: macos-latest
            goos: darwin
            goarch: arm64
            cgo: '1'
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Install Linux build deps (ebiten)
        if: matrix.goos == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libc6-dev libgl1-mesa-dev libglu1-mesa-dev \
            libxcursor-dev libxi-dev libxinerama-dev libxrandr-dev \
            libxxf86vm-dev libasound2-dev pkg-config

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: ${{ matrix.cgo }}
        run: |
          VERSION=$(git describe --tags --always --dirty)
          go build -ldflags "-X main.version=$VERSION" \
            -o dist/$APP-${{ matrix.target }}${{ matrix.ext }} $ENTRYPOINT

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP }}-${{ matrix.target }}
          path: dist/*

  pages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Build WASM
        env:
          GOOS: js
          GOARCH: wasm
        run: go build -ldflags "-X main.version=$(git describe --tags --always --dirty)" -o client/wasm/$APP.wasm $ENTRYPOINT

      - name: Copy wasm_exec.js
        run: |
          GOROOT=$(go env GOROOT)
          if [ -f "$GOROOT/lib/wasm/wasm_exec.js" ]; then
            cp "$GOROOT/lib/wasm/wasm_exec.js" client/wasm/wasm_exec.js
          else
            cp "$GOROOT/misc/wasm/wasm_exec.js" client/wasm/wasm_exec.js
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ticking-clue-wasm
          path: |
            client/wasm/ticking-clue.wasm
            client/wasm/index.html
            client/wasm/wasm_exec.js

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./client/wasm