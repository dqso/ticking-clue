<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Ticking Clue</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
  <script src="wasm_exec.js"></script>
  <script>
    const go = new Go();
    WebAssembly.instantiateStreaming(fetch('ticking-clue.wasm'), go.importObject)
      .then(r => go.run(r.instance))
      .catch(err => {
        document.body.innerHTML = '<p style="color:#fff;font-family:sans-serif;padding:20px">Failed to load: ' + err + '</p>';
      });
  </script>
</body>
</html>
